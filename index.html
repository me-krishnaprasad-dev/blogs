<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 20px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fafafa;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        li:hover {
            background-color: #e9e9e9;
        }
        .blog-content {
            display: none;
            margin-top: 20px;
        }
        .blog-content.show {
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }
        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Blog</h1>
    </header>
    <div class="container">
        <div id="blog-list">
            <h2>Blog Posts</h2>
            <ul id="file-list"></ul>
        </div>
        <div id="blog-content" class="blog-content">
            <a href="#" id="back-btn" class="back-btn">← Back to Blog List</a>
            <div id="content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const repo = 'me-krishnaprasad-dev/blogs';
        const apiUrl = `https://api.github.com/repos/${repo}/contents/`;

        const blogList = document.getElementById('blog-list');
        const blogContent = document.getElementById('blog-content');
        const fileList = document.getElementById('file-list');
        const contentDiv = document.getElementById('content');
        const backBtn = document.getElementById('back-btn');

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Repository not found or empty');
                }
                return response.json();
            })
            .then(data => {
                const mdFiles = data.filter(item => item.type === 'file' && item.name.endsWith('.md'));
                
                if (mdFiles.length === 0) {
                    fileList.innerHTML = '<li>No blog posts found.</li>';
                    return;
                }

                // Fetch commit dates for each file
                const promises = mdFiles.map(file => {
                    return fetch(`https://api.github.com/repos/${repo}/commits?path=${file.path}`)
                        .then(r => r.json())
                        .then(commits => {
                            if (commits.length > 0) {
                                const firstCommit = commits[commits.length - 1]; // oldest
                                const lastCommit = commits[0]; // newest
                                file.created = new Date(firstCommit.commit.author.date);
                                file.modified = new Date(lastCommit.commit.author.date);
                            } else {
                                file.created = new Date();
                                file.modified = new Date();
                            }
                            return file;
                        })
                        .catch(() => {
                            file.created = new Date();
                            file.modified = new Date();
                            return file;
                        });
                });

                Promise.all(promises).then(files => {
                    // Sort by creation date, newest first
                    files.sort((a, b) => b.created - a.created);

                    files.forEach(file => {
                        const li = document.createElement('li');
                        li.innerHTML = `<strong>${file.name.replace('.md', '')}</strong><br><small>Created: ${file.created.toLocaleDateString()}</small>`;
                        li.addEventListener('click', () => showBlog(file));
                        fileList.appendChild(li);
                    });
                });
            })
            .catch(error => {
                fileList.innerHTML = '<li>Error loading blogs: ' + error.message + '</li>';
            });

        function showBlog(file) {
            fetch(file.download_url)
                .then(response => response.text())
                .then(markdown => {
                    const dateInfo = `<p><small>Created: ${file.created.toLocaleDateString()} | Last modified: ${file.modified.toLocaleDateString()}</small></p>`;
                    contentDiv.innerHTML = dateInfo + marked.parse(markdown);
                    blogList.style.display = 'none';
                    blogContent.classList.add('show');
                })
                .catch(error => {
                    contentDiv.innerHTML = 'Error loading blog: ' + error.message;
                    blogList.style.display = 'none';
                    blogContent.classList.add('show');
                });
        }

        backBtn.addEventListener('click', () => {
            blogContent.classList.remove('show');
            blogList.style.display = 'block';
        });
    </script>
</body>
</html>
