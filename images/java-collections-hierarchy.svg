<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <defs>
    <style>
      .box { fill: #e1f5fe; stroke: #01579b; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #01579b; stroke-width: 2; marker-end: url(#arrowhead); }
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#01579b" />
      </marker>
    </style>
  </defs>

  <!-- Collection -->
  <rect x="250" y="20" width="100" height="40" class="box"/>
  <text x="300" y="40" class="text">Collection</text>

  <!-- Arrows from Collection -->
  <line x1="300" y1="60" x2="200" y2="100" class="arrow"/>
  <line x1="300" y1="60" x2="300" y2="100" class="arrow"/>
  <line x1="300" y1="60" x2="400" y2="100" class="arrow"/>

  <!-- List -->
  <rect x="150" y="100" width="100" height="40" class="box"/>
  <text x="200" y="120" class="text">List</text>

  <!-- Set -->
  <rect x="250" y="100" width="100" height="40" class="box"/>
  <text x="300" y="120" class="text">Set</text>

  <!-- Queue -->
  <rect x="350" y="100" width="100" height="40" class="box"/>
  <text x="400" y="120" class="text">Queue</text>

  <!-- Arrows from List -->
  <line x1="200" y1="140" x2="150" y2="180" class="arrow"/>
  <line x1="200" y1="140" x2="250" y2="180" class="arrow"/>

  <!-- ArrayList -->
  <rect x="100" y="180" width="100" height="30" class="box"/>
  <text x="150" y="195" class="text">ArrayList</text>

  <!-- LinkedList -->
  <rect x="200" y="180" width="100" height="30" class="box"/>
  <text x="250" y="195" class="text">LinkedList</text>

  <!-- Arrows from Set -->
  <line x1="300" y1="140" x2="275" y2="180" class="arrow"/>
  <line x1="300" y1="140" x2="325" y2="180" class="arrow"/>

  <!-- HashSet -->
  <rect x="225" y="180" width="100" height="30" class="box"/>
  <text x="275" y="195" class="text">HashSet</text>

  <!-- TreeSet -->
  <rect x="325" y="180" width="100" height="30" class="box"/>
  <text x="375" y="195" class="text">TreeSet</text>

  <!-- Arrows from Queue -->
  <line x1="400" y1="140" x2="375" y2="180" class="arrow"/>

  <!-- PriorityQueue -->
  <rect x="325" y="220" width="100" height="30" class="box"/>
  <text x="375" y="235" class="text">PriorityQueue</text>

  <!-- Map (separate) -->
  <rect x="450" y="100" width="100" height="40" class="box"/>
  <text x="500" y="120" class="text">Map</text>

  <!-- Arrows from Map -->
  <line x1="500" y1="140" x2="475" y2="180" class="arrow"/>
  <line x1="500" y1="140" x2="525" y2="180" class="arrow"/>

  <!-- HashMap -->
  <rect x="425" y="180" width="100" height="30" class="box"/>
  <text x="475" y="195" class="text">HashMap</text>

  <!-- TreeMap -->
  <rect x="525" y="180" width="100" height="30" class="box"/>
  <text x="575" y="195" class="text">TreeMap</text>
</svg>